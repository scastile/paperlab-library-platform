services:
  backend:
    build: ./backend
    env_file: ./backend/.env
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - AI_MODEL=google/gemini-2.5-flash-lite
      - SUPABASE_URL=http://host.docker.internal:8001
      - DB_PATH=/app/data/escape_rooms.db
    volumes:
      - /opt/projects/escape-room-designer/data:/app/data
    networks:
      - default
      - papercore
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "0.0.0.0:8203:80"
    networks:
      - default
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
  papercore:
    external: true
