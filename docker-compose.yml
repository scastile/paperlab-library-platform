services:
  # --- Library Launchpad ---
  launchpad-backend:
    build:
      context: .
      dockerfile: apps/library-launchpad/backend/Dockerfile
    env_file: ./apps/library-launchpad/backend/.env
    volumes:
      - ./apps/library-launchpad/data:/app/data
    networks:
      - default
      - papercore
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  launchpad-frontend:
    build:
      context: ./apps/library-launchpad/frontend
      args:
        VITE_SUPABASE_URL: http://10.0.0.179:8001
        VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNzc4Njg0NTU0LCJleHAiOjIwOTQwNDQ1NTQsImlzX2FkbWluIjpmYWxzZX0.OT6aSuWokf8DAIwlvsIJwRHFFbzUIMIPJ7ROHo5ZlOU
    ports:
      - "8200:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
    depends_on:
      - launchpad-backend
    restart: unless-stopped

  # --- Escape Room Designer ---
  escape-backend:
    build:
      context: .
      dockerfile: apps/escape-room-designer/backend/Dockerfile
    env_file: ./apps/escape-room-designer/backend/.env
    volumes:
      - ./apps/escape-room-designer/data:/app/data
    networks:
      - default
      - papercore
      - supabase_default
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  escape-frontend:
    build:
      context: ./apps/escape-room-designer/frontend
      args:
        VITE_SUPABASE_URL: http://10.0.0.179:8001
        VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNzc4Njg0NTU0LCJleHAiOjIwOTQwNDQ1NTQsImlzX2FkbWluIjpmYWxzZX0.OT6aSuWokf8DAIwlvsIJwRHFFbzUIMIPJ7ROHo5ZlOU
    ports:
      - "8203:80"
    networks:
      - default
    depends_on:
      - escape-backend
    restart: unless-stopped

  # --- Event Flyer Studio ---
  flyer-backend:
    build:
      context: .
      dockerfile: apps/event-flyer-studio/backend/Dockerfile
    env_file: ./apps/event-flyer-studio/backend/.env
    environment:
      - AI_MODEL=google/gemini-2.5-flash
      - SUPABASE_URL=http://host.docker.internal:8001
      - DB_PATH=/app/data/flyers.db
      - LAUNCHPAD_URL=http://launchpad-backend:8000
    volumes:
      - ./apps/event-flyer-studio/data:/app/data
    networks:
      - default
      - papercore
      - supabase_default
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  flyer-frontend:
    build:
      context: ./apps/event-flyer-studio/frontend
      args:
        VITE_SUPABASE_URL: http://10.0.0.179:8001
        VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNzc4Njg0NTU0LCJleHAiOjIwOTQwNDQ1NTQsImlzX2FkbWluIjpmYWxzZX0.OT6aSuWokf8DAIwlvsIJwRHFFbzUIMIPJ7ROHo5ZlOU
    ports:
      - "8204:80"
    networks:
      - default
    depends_on:
      - flyer-backend
    restart: unless-stopped

  # --- LibPaper Landing Page ---
  landing:
    build:
      context: ./apps/libpaper-landing
      args:
        VITE_SUPABASE_URL: http://10.0.0.179:8001
        VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNzc4Njg0NTU0LCJleHAiOjIwOTQwNDQ1NTQsImlzX2FkbWluIjpmYWxzZX0.OT6aSuWokf8DAIwlvsIJwRHFFbzUIMIPJ7ROHo5ZlOU
    ports:
      - "8202:80"
    networks:
      - default
      - papercore
    depends_on:
      - launchpad-backend
    restart: unless-stopped

  # --- LibBrain ---
  libbrain-backend:
    build:
      context: .
      dockerfile: apps/libbrain/backend/Dockerfile
    env_file: ./apps/libbrain/backend/.env
    environment:
      - DB_PATH=/app/data/libbrain.db
      - SUPABASE_URL=http://host.docker.internal:8001
    volumes:
      - ./apps/libbrain/data:/app/data
    networks:
      - default
      - papercore
      - supabase_default
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  libbrain-frontend:
    build:
      context: ./apps/libbrain/frontend
      args:
        VITE_SUPABASE_URL: http://10.0.0.179:8001
        VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNzc4Njg0NTU0LCJleHAiOjIwOTQwNDQ1NTQsImlzX2FkbWluIjpmYWxzZX0.OT6aSuWokf8DAIwlvsIJwRHFFbzUIMIPJ7ROHo5ZlOU
    ports:
      - "8205:80"
    networks:
      - default
    depends_on:
      - libbrain-backend
    restart: unless-stopped

networks:
  default:
  papercore:
    external: true
  supabase_default:
    external: true
