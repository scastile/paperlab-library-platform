services:
  # --- Library Launchpad ---
  launchpad-backend:
    build: ./apps/library-launchpad/backend
    env_file: ./apps/library-launchpad/backend/.env
    volumes:
      - ./apps/library-launchpad/data:/app/data
    networks:
      - default
      - papercore
    restart: unless-stopped

  launchpad-frontend:
    build:
      context: ./apps/library-launchpad/frontend
      args:
        VITE_SUPABASE_URL: http://10.0.0.179:8001
        VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjowLCJleHAiOjk5OTk5OTk5OTl9.o4txs_Q5kj86L9JFbZS9uULFTMh5Zjw6FLKGhNM-xCc
    ports:
      - "8200:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
    depends_on:
      - launchpad-backend
    restart: unless-stopped

  # --- Escape Room Designer ---
  escape-backend:
    build: ./apps/escape-room-designer/backend
    env_file: ./apps/escape-room-designer/backend/.env
    volumes:
      - ./apps/escape-room-designer/data:/app/data
    networks:
      - default
      - papercore
    restart: unless-stopped

  escape-frontend:
    build:
      context: ./apps/escape-room-designer/frontend
      args:
        VITE_SUPABASE_URL: http://10.0.0.179:8001
        VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjowLCJleHAiOjk5OTk5OTk5OTl9.o4txs_Q5kj86L9JFbZS9uULFTMh5Zjw6FLKGhNM-xCc
    ports:
      - "8203:80"
    networks:
      - default
    depends_on:
      - escape-backend
    restart: unless-stopped

  # --- Event Flyer Studio ---
  flyer-backend:
    build: ./apps/event-flyer-studio/backend
    env_file: ./apps/event-flyer-studio/backend/.env
    environment:
      - AI_MODEL=google/gemini-2.5-flash
      - SUPABASE_URL=http://host.docker.internal:8001
      - DB_PATH=/app/data/flyers.db
      - LAUNCHPAD_URL=http://launchpad-backend:8000
    volumes:
      - ./apps/event-flyer-studio/data:/app/data
    networks:
      - default
      - papercore
    restart: unless-stopped

  flyer-frontend:
    build:
      context: ./apps/event-flyer-studio/frontend
      args:
        VITE_SUPABASE_URL: http://10.0.0.179:8001
        VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjowLCJleHAiOjk5OTk5OTk5OTl9.o4txs_Q5kj86L9JFbZS9uULFTMh5Zjw6FLKGhNM-xCc
    ports:
      - "8204:80"
    networks:
      - default
    depends_on:
      - flyer-backend
    restart: unless-stopped

  # --- LibPaper Landing Page ---
  landing:
    build:
      context: ./apps/libpaper-landing
      args:
        VITE_SUPABASE_URL: http://10.0.0.179:8001
        VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjowLCJleHAiOjk5OTk5OTk5OTl9.o4txs_Q5kj86L9JFbZS9uULFTMh5Zjw6FLKGhNM-xCc
    ports:
      - "8202:80"
    networks:
      - default
      - papercore
    depends_on:
      - launchpad-backend
    restart: unless-stopped

networks:
  default:
  papercore:
    external: true
